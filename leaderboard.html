<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Leaderboard</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 2vw 2vw 100px 2vw; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: white;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            font-weight: 900;
            font-size: clamp(16px, 5vw, 24px); 
            margin-bottom: 10px;
            color: #ffcc00;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- TABS CSS --- */
        .tabs {
            display: flex;
            justify-content: center;
            flex-wrap: wrap; /* Allows tabs to stack nicely on very skinny iframes */
            gap: 10px;
            margin-bottom: 15px;
        }

        .tab {
            background-color: #333;
            color: #888;
            border: 2px solid #444;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: clamp(10px, 3.5vw, 13px);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .tab.active {
            background-color: rgba(255, 204, 0, 0.1);
            color: #ffcc00;
            border-color: #ffcc00;
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.3);
        }

        .tab:hover:not(.active) {
            background-color: #444;
            color: white;
        }

        .player-row {
            display: flex;
            align-items: center;
            background-color: #2a2a2a;
            margin-bottom: 8px;
            padding: 2vw 3vw;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s;
            gap: 8px;
        }

        .player-row:hover {
            transform: scale(1.02);
            background-color: #333;
        }

        .rank {
            font-size: clamp(14px, 4vw, 18px);
            font-weight: bold;
            min-width: 25px;
            color: #888;
        }

        .rank-1 { color: #ffd700; text-shadow: 0 0 5px rgba(255,215,0,0.5); }
        .rank-2 { color: #c0c0c0; text-shadow: 0 0 5px rgba(192,192,192,0.5); }
        .rank-3 { color: #cd7f32; text-shadow: 0 0 5px rgba(205,127,50,0.5); }

        .pfp {
            width: clamp(24px, 8vw, 40px);
            height: clamp(24px, 8vw, 40px);
            border-radius: 50%;
            object-fit: cover;
            background-color: #444;
            border: 2px solid #555;
            flex-shrink: 0;
        }

        .username {
            flex-grow: 1;
            font-size: clamp(12px, 4vw, 16px);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        .score {
            font-weight: bold;
            color: #4caf50;
            font-family: monospace;
            font-size: clamp(12px, 4vw, 18px);
            flex-shrink: 0;
        }

        .loading {
            text-align: center;
            color: #888;
            font-style: italic;
            margin-top: 20px;
            font-size: clamp(12px, 4vw, 16px);
        }

        /* --- MAJOR ORDER FOOTER CSS --- */
        .mo-footer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background-color: #1a1a1a;
            border-top: 2px solid #ffcc00;
            padding: 10px 15px;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.9);
            z-index: 100;
        }

        .mo-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 8px;
        }

        .mo-title {
            font-size: clamp(12px, 3.5vw, 16px);
            font-weight: 900;
            color: #ffcc00;
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(255,204,0,0.4);
        }

        .mo-reward {
            font-size: clamp(10px, 3vw, 13px);
            font-weight: bold;
            color: #00e5ff; 
            text-transform: uppercase;
            text-shadow: 0 0 5px rgba(0,229,255,0.5);
            background: rgba(0, 229, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid rgba(0,229,255,0.3);
        }

        .mo-progress-bar-bg {
            width: 100%;
            height: 16px;
            background-color: #0a0a0a;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #333;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
            margin-bottom: 6px;
        }

        .mo-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff8800, #ffcc00);
            width: 0%; 
            transition: width 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
        }

        .mo-progress-fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: repeating-linear-gradient(
                -45deg,
                rgba(255, 255, 255, 0.25),
                rgba(255, 255, 255, 0.25) 10px,
                transparent 10px,
                transparent 20px
            );
            background-size: 28px 28px;
            animation: energyFlow 1s linear infinite;
        }

        .mo-progress-fill::before {
            content: '';
            position: absolute;
            right: 0; 
            top: 50%;
            transform: translateY(-50%);
            width: 6px;
            height: 14px;
            background-color: #ffffff;
            border-radius: 50%;
            z-index: 10;
            animation: fizzleSparks 0.15s infinite alternate;
        }

        @keyframes energyFlow {
            0% { background-position: 0 0; }
            100% { background-position: 28px 0; }
        }

        @keyframes fizzleSparks {
            0% {
                opacity: 0.8;
                box-shadow: 0 0 8px 2px #ffffff, -2px -5px 3px #ffcc00, 2px 6px 4px #ff8800, 0 0 15px 5px #ffcc00;
            }
            100% {
                opacity: 1;
                box-shadow: 0 0 12px 4px #ffffff, 3px -6px 4px #ff8800, -1px 5px 2px #ffcc00, 0 0 25px 8px #ffcc00;
            }
        }

        .mo-stats {
            font-size: clamp(10px, 3vw, 12px);
            color: #ccc;
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            font-weight: bold;
        }
        
        .mo-percentage { color: #ffcc00; }
        .mo-completed-text { color: #4caf50; font-weight: 900; }
    </style>
</head>
<body>

    <div class="header">🏆 Leaderboards</div>
    
    <div class="tabs">
        <button id="tab-global" class="tab active" onclick="setTab('global')">All-Time Clicks</button>
        <button id="tab-mission" class="tab" onclick="setTab('mission')">Major Order</button>
        <button id="tab-playtime" class="tab" onclick="setTab('playtime')">Playtime</button>
    </div>

    <div id="leaderboard-list">
        <div class="loading">Fetching data...</div>
    </div>

    <div class="mo-footer" id="mo-container" style="display: none;">
        <div class="mo-header-row">
            <div class="mo-title" id="mo-name">MAJOR ORDER: STANDBY</div>
            <div class="mo-reward" id="mo-reward-text">REWARD: ???</div>
        </div>
        <div class="mo-progress-bar-bg">
            <div class="mo-progress-fill" id="mo-fill"></div>
        </div>
        <div class="mo-stats">
            <span id="mo-numbers">0 / 0</span>
            <span id="mo-percent-text" class="mo-percentage">0%</span>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://lriizufytmdvxwcyjtqz.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxyaWl6dWZ5dG1kdnh3Y3lqdHF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzMzOTMsImV4cCI6MjA4NzgwOTM5M30.dDqU0McuLngEptd7vU3rqcE06qTKxDql4h44hFSGwBc';

        const leaderboardContainer = document.getElementById('leaderboard-list');
        const pfpCache = {};
        
        let currentTab = 'global';

        const dbHeaders = {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
        };

        function setTab(tabName) {
            if (currentTab === tabName) return; 
            
            currentTab = tabName;
            
            document.getElementById('tab-global').classList.toggle('active', tabName === 'global');
            document.getElementById('tab-mission').classList.toggle('active', tabName === 'mission');
            document.getElementById('tab-playtime').classList.toggle('active', tabName === 'playtime');
            
            leaderboardContainer.innerHTML = '<div class="loading">Fetching data...</div>';
            loadLeaderboard();
        }

        async function loadLeaderboard() {
            try {
                let endpoint = 'fetch_global_leaderboard';
                if (currentTab === 'mission') endpoint = 'fetch_mission_leaderboard';
                if (currentTab === 'playtime') endpoint = 'fetch_playtime_leaderboard';

                const [leaderboardRes, moRes] = await Promise.all([
                    fetch(`${SUPABASE_URL}/rest/v1/rpc/${endpoint}`, { method: 'POST', headers: dbHeaders }),
                    fetch(`${SUPABASE_URL}/rest/v1/rpc/fetch_major_order_status`, { method: 'POST', headers: dbHeaders })
                ]);

                if (!leaderboardRes.ok || !moRes.ok) throw new Error('Database error');
                
                const players = await leaderboardRes.json();
                const moData = await moRes.json();

                if (players.length === 0) {
                    leaderboardContainer.innerHTML = '<div class="loading">No players found!</div>';
                } else {
                    const currentScroll = document.documentElement.scrollTop || document.body.scrollTop;
                    let newHTML = '';
                    
                    players.forEach((player, index) => {
                        const rank = index + 1;
                        let rankClass = '';
                        if (rank === 1) rankClass = 'rank-1';
                        if (rank === 2) rankClass = 'rank-2';
                        if (rank === 3) rankClass = 'rank-3';

                        let imageSource = 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs='; 
                        if (pfpCache[player.username]) {
                            imageSource = pfpCache[player.username];
                        }

                        // Time Formatting Math
                        let displayScore = '';
                        if (currentTab === 'playtime') {
                            const totalSeconds = player.total_clicks; // This is actually seconds from the SQL alias!
                            const hours = Math.floor(totalSeconds / 3600);
                            const minutes = Math.floor((totalSeconds % 3600) / 60);
                            const seconds = totalSeconds % 60;
                            
                            if (hours > 0) {
                                displayScore = `${hours}h ${minutes}m`;
                            } else if (minutes > 0) {
                                displayScore = `${minutes}m ${seconds}s`;
                            } else {
                                displayScore = `${seconds}s`;
                            }
                        } else {
                            displayScore = player.total_clicks.toLocaleString();
                        }

                        newHTML += `
                            <div class="player-row">
                                <div class="rank ${rankClass}">#${rank}</div>
                                <img src="${imageSource}" class="pfp" id="pfp-${player.username}" />
                                <div class="username">${player.username}</div>
                                <div class="score">${displayScore}</div>
                            </div>
                        `;
                    });

                    leaderboardContainer.innerHTML = newHTML;
                    document.documentElement.scrollTop = currentScroll;
                    document.body.scrollTop = currentScroll;

                    players.forEach(player => {
                        if (!pfpCache[player.username]) {
                            fetchCodeTorchPFP(player.username);
                        }
                    });
                }

                const moContainer = document.getElementById('mo-container');
                if (moData && moData.name && moData.name !== 'None') {
                    moContainer.style.display = 'block'; 
                    document.getElementById('mo-name').innerText = `${moData.name}`;
                    document.getElementById('mo-reward-text').innerText = `REWARD: ${moData.reward}`;
                    
                    let rawPercentage = (moData.progress / moData.goal) * 100;
                    if (rawPercentage > 100) rawPercentage = 100;
                    
                    document.getElementById('mo-fill').style.width = `${rawPercentage}%`;
                    document.getElementById('mo-numbers').innerText = `${moData.progress.toLocaleString()} / ${moData.goal.toLocaleString()} CLICKS`;
                    
                    const percentEl = document.getElementById('mo-percent-text');
                    if (rawPercentage >= 100) {
                        percentEl.innerText = "MISSION COMPLETED";
                        percentEl.className = "mo-completed-text";
                    } else {
                        let displayPercentage = rawPercentage.toFixed(1);
                        if (displayPercentage.endsWith('.0')) displayPercentage = Math.round(rawPercentage);
                        percentEl.innerText = `${displayPercentage}%`;
                        percentEl.className = "mo-percentage";
                    }
                } else {
                    moContainer.style.display = 'none';
                }

            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        async function fetchCodeTorchPFP(username) {
            try {
                const res = await fetch(`https://api.codetorch.net/v1/users/${username}`);
                if (res.ok) {
                    const data = await res.json();
                    if (data.pfp) {
                        pfpCache[username] = data.pfp;
                        const imgElement = document.getElementById(`pfp-${username}`);
                        if (imgElement) {
                            imgElement.src = data.pfp;
                        }
                    }
                }
            } catch (e) {
                console.log(`Could not load PFP for ${username}`);
            }
        }

        loadLeaderboard();
        setInterval(loadLeaderboard, 10000); 
    </script>
</body>
</html>
